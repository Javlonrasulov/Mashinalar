services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mashinalar}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-true}
      OVERPASS_URL: ${OVERPASS_URL:-}
      OVERPASS_TIMEOUT_SEC: ${OVERPASS_TIMEOUT_SEC:-}
      OVERPASS_USER_AGENT: ${OVERPASS_USER_AGENT:-}
      FUEL_STATIONS_DEFAULT_BBOX: ${FUEL_STATIONS_DEFAULT_BBOX:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-18080}:80"
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  api_uploads:

